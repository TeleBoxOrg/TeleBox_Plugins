name: Notify TeleBoxLabs Mirror

# 上游 main 有提交时立刻触发 TeleBoxLabs fork 的同步
on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: notify-teleboxlabs-${{ github.repository }}
  cancel-in-progress: false

jobs:
  dispatch-mirror:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Dispatch Sync from TeleBoxOrg on TeleBoxLabs fork
        env:
          GH_TOKEN: ${{ secrets.TELEBOXLABS_SYNC_TOKEN }}
          FORK_OWNER: TeleBoxLabs
          REPO_NAME: ${{ github.event.repository.name }}
        run: |
          set -euo pipefail
          if [ -z "${GH_TOKEN:-}" ]; then
            echo "::error::Missing secret TELEBOXLABS_SYNC_TOKEN (PAT with repo+workflow on TeleBoxLabs forks)"
            exit 1
          fi

          # Prefer workflow_dispatch; fall back to repository_dispatch
          HTTP=$(curl -sS -o /tmp/dispatch-body.json -w "%{http_code}" \
            -X POST \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${FORK_OWNER}/${REPO_NAME}/actions/workflows/sync-upstream.yml/dispatches" \
            -d '{"ref":"main"}')

          echo "workflow_dispatch HTTP ${HTTP}"
          cat /tmp/dispatch-body.json || true
          echo

          if [ "$HTTP" = "204" ] || [ "$HTTP" = "200" ]; then
            echo "✅ Dispatched TeleBoxLabs/${REPO_NAME} sync-upstream.yml"
            exit 0
          fi

          echo "workflow_dispatch failed; trying repository_dispatch..."
          HTTP2=$(curl -sS -o /tmp/rd-body.json -w "%{http_code}" \
            -X POST \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${FORK_OWNER}/${REPO_NAME}/dispatches" \
            -d '{"event_type":"sync-upstream"}')

          echo "repository_dispatch HTTP ${HTTP2}"
          cat /tmp/rd-body.json || true
          echo

          if [ "$HTTP2" = "204" ] || [ "$HTTP2" = "200" ]; then
            echo "✅ repository_dispatch sync-upstream on TeleBoxLabs/${REPO_NAME}"
            exit 0
          fi

          echo "::error::Failed to trigger TeleBoxLabs mirror (workflow_dispatch=${HTTP}, repository_dispatch=${HTTP2})"
          exit 1
